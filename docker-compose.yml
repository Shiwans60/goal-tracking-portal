version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: atomquest-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: atomquest
      POSTGRES_USER: atomquest
      POSTGRES_PASSWORD: atomquest_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atomquest"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: atomquest-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/atomquest
      DATABASE_USERNAME: atomquest
      DATABASE_PASSWORD: atomquest_dev
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: http://localhost:8080/login/oauth2/code/google
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      JWT_EXPIRY_MS: 86400000
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-noreply@company.com}
      FRONTEND_URL: http://localhost:4200
      CORS_ALLOWED_ORIGINS: http://localhost:4200
      SPRING_PROFILES_ACTIVE: dev
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: atomquest-ui
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      API_BASE_URL: http://localhost:8080
    ports:
      - "4200:80"

volumes:
  pgdata:
