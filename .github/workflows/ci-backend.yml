name: Backend CI

on:
  push:
    branches: [ main, develop ]
    paths: [ 'backend/**' ]
  pull_request:
    branches: [ main ]
    paths: [ 'backend/**' ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: atomquest_test
          POSTGRES_USER: atomquest
          POSTGRES_PASSWORD: test_password
        ports: [ '5432:5432' ]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build & test
        working-directory: backend
        env:
          DATABASE_URL: jdbc:postgresql://localhost:5432/atomquest_test
          DATABASE_USERNAME: atomquest
          DATABASE_PASSWORD: test_password
          JWT_SECRET: ci-test-secret-not-for-production-use-at-all
          GOOGLE_CLIENT_ID: placeholder-ci
          GOOGLE_CLIENT_SECRET: placeholder-ci
        run: mvn -q verify

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-report
          path: backend/target/surefire-reports/