spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/atomquest_test}
    username: ${DATABASE_USERNAME:atomquest}
    password: ${DATABASE_PASSWORD:test_password}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  mail:
    host: localhost
    port: 1025
    username: ""
    password: ""

app:
  jwt:
    secret: test-secret-key-for-ci-only-not-for-production-use
    expiry-ms: 3600000
  frontend-url: http://localhost:4200
  mail-from: test@localhost
  cors-allowed-origins: http://localhost:4200

logging:
  level:
    root: WARN
    com.atomquest: INFO
